name: Check for new Express Entry draws

on:
  schedule:
    - cron: '0 9 * * 1,3'  # Mon + Wed 9am UTC
  workflow_dispatch:         # allow manual trigger to test

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest draw date from IRCC
        id: ircc
        run: |
          PAGE=$(curl -s --max-time 30 \
            "https://www.canada.ca/en/immigration-refugees-citizenship/services/immigrate-canada/express-entry/submit-profile/rounds-invitations.html")

          # ISO dates appear in data attributes and structured content on the IRCC page
          LATEST=$(echo "$PAGE" | grep -o "202[0-9]-[0-9][0-9]-[0-9][0-9]" | sort -r | head -1)

          if [ -z "$LATEST" ]; then
            echo "::warning::Could not parse any date from the IRCC page. The page structure may have changed."
            echo "latest=" >> "$GITHUB_OUTPUT"
          else
            echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
            echo "Most recent date found on IRCC page: $LATEST"
          fi

      - name: Compare with repo DRAWS_LAST_UPDATED
        run: |
          REPO_DATE=$(grep 'DRAWS_LAST_UPDATED' lib/draws.ts | grep -o "[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}")
          LATEST="${{ steps.ircc.outputs.latest }}"

          echo "Repo DRAWS_LAST_UPDATED : $REPO_DATE"
          echo "Latest date on IRCC page: $LATEST"

          if [ -z "$LATEST" ]; then
            echo "Skipping comparison — no date was parsed from IRCC page."
            exit 0
          fi

          if [[ "$LATEST" > "$REPO_DATE" ]]; then
            echo "::error::New draw detected: $LATEST (repo last updated: $REPO_DATE)"
            echo ""
            echo "Run the update script:"
            echo "  npx ts-node scripts/add-draw.ts --type \"<type>\" --date \"<date>\" --cutoff <score> --invited <count>"
            echo ""
            echo "Then commit:"
            echo "  git add lib/draws.ts && git commit -m \"draws: <date> <type> cutoff <score>\""
            exit 1
          fi

          echo "No new draws. Repo is current as of $REPO_DATE."
